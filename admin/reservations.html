    <div class="panel">
      <form method="get" class="search-form">

          <tbody>
            <?php foreach ($reservations as $reservation): ?>
              <?php $paymentStatus = $reservation['payment_status'] ?? 'pending'; ?>
              <tr>
                <td><?php echo (int)$reservation['id']; ?></td>
                <td><?php echo htmlspecialchars($reservation['name']); ?></td>

                <td><?php echo htmlspecialchars(formatReservationDate($reservation['reservation_date'])); ?></td>
                <td><?php echo htmlspecialchars($reservation['reservation_time']); ?></td>
                <td><?php echo (int)$reservation['guests']; ?></td>
                <td><?php echo htmlspecialchars($reservation['event_type'] ?? '—'); ?></td>
                <td><?php echo htmlspecialchars($reservation['payment_method'] ?: '—'); ?></td>
                <td><span class="badge badge-<?php echo htmlspecialchars($paymentStatus); ?>"><?php echo htmlspecialchars(ucfirst($paymentStatus)); ?></span></td>

                  <form method="post" action="reservations.php" class="action-row">
                    <input type="hidden" name="reservation_id" value="<?php echo (int)$reservation['id']; ?>" />
                    <input type="hidden" name="update_status" value="1" />
                    <select name="status">
                      <option value="pending" <?php echo $reservation['status'] === 'pending' ? 'selected' : ''; ?>>Pending</option>
                      <option value="approved" <?php echo $reservation['status'] === 'approved' ? 'selected' : ''; ?>>Approved</option>
                      <option value="not available" <?php echo $reservation['status'] === 'not available' ? 'selected' : ''; ?>>Not Available</option>
                      <option value="cancelled" <?php echo $reservation['status'] === 'cancelled' ? 'selected' : ''; ?>>Cancelled</option>
                    </select>

                  </form>
                </td>
              </tr>

            <?php if (!$reservations): ?>
              <tr><td colspan="11" class="empty-row">No reservations found.</td></tr>
            <?php endif; ?>

        </table>
